# ─────────────────────────────────────────────────────────────
# LLM Studio — Nginx Integration Fragment
#
# Add these location blocks to the company-portal nginx config:
#   ~/prhyme/projects/hedgefund/code/company-portal/nginx.conf
#
# See INTEGRATION.md §4 for full details.
# ─────────────────────────────────────────────────────────────

# ── LLM Gateway API ──
# Used by portal dashboards for model status, endpoint listing, etc.
location /api/llm/ {
    proxy_pass http://llm-gateway:3100/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
}

# ── Agent Runner API + WebSocket Terminal ──
# Both REST API and WebSocket upgrade (xterm.js terminal)
location /api/agents/ {
    proxy_pass http://agent-runner:3200/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
}

# ── Open WebUI (via auth-bridge for SSO) ──
# Requires auth-bridge service to be running.
# If not using auth-bridge, replace with direct proxy to open-webui:8080.
location /llm-studio/ {
    proxy_pass http://auth-bridge:3300/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
}
